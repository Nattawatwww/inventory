<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key Management</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        :root {
            --bg: #0b0f1a;
            --card-bg: rgba(23, 28, 41, 0.8);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #6366f1;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --success: #10b981; /* เพิ่มสีเขียวสำหรับ Reset */
            --input-bg: rgba(255, 255, 255, 0.03);
        }

        * { 
            box-sizing: border-box; 
            transition: all 0.2s ease; 
            font-family: 'Inter', sans-serif;
            letter-spacing: -0.01em;
        }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1e1b4b, var(--bg));
            color: var(--text-main);
            margin: 0;
            display: flex; justify-content: center;
            min-height: 100vh; padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container { width: 100%; max-width: 440px; }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        h2 { 
            margin: 0 0 24px 0; 
            font-weight: 600; 
            font-size: 18px; 
            text-align: center; 
            letter-spacing: -0.02em;
        }

        .label { 
            font-size: 10px; 
            font-weight: 600; 
            color: var(--text-dim); 
            text-transform: uppercase; 
            letter-spacing: 0.05em; 
            margin-bottom: 8px; 
            display: block; 
        }

        .custom-select { position: relative; width: 100%; margin-bottom: 20px; }
        .select-selected {
            background: var(--input-bg);
            border: 1px solid var(--border);
            padding: 14px 18px;
            border-radius: 16px;
            cursor: pointer;
            display: flex; justify-content: space-between; align-items: center; 
            font-size: 14px;
        }
        .select-selected:after {
            content: ""; width: 6px; height: 6px;
            border-right: 1.5px solid var(--text-dim); border-bottom: 1.5px solid var(--text-dim);
            transform: rotate(45deg); margin-bottom: 3px;
        }
        .select-items {
            position: absolute; background: #161b2a; border: 1px solid var(--border);
            border-radius: 16px; top: calc(100% + 8px); left: 0; right: 0;
            z-index: 99; overflow: hidden; opacity: 0; transform: translateY(-10px);
            pointer-events: none; box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .select-items div { padding: 14px 18px; cursor: pointer; font-size: 14px; color: var(--text-dim); }
        .select-items div:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }
        .select-show { opacity: 1; transform: translateY(0); pointer-events: auto; }

        input {
            width: 100%; background: var(--input-bg); border: 1px solid var(--border);
            padding: 14px 18px; border-radius: 16px; color: #fff; font-size: 14px;
            margin-bottom: 20px; outline: none;
        }
        input:focus { border-color: var(--accent); }

        button {
            width: 100%; padding: 14px; border-radius: 16px; border: none;
            font-weight: 500; cursor: pointer; font-size: 14px;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { transform: translateY(-1px); filter: brightness(1.1); }

        .key-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 20px; padding: 18px; margin-bottom: 12px;
        }
        .key-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .key-id { font-weight: 600; font-size: 14px; color: #fff; letter-spacing: 0.02em; }
        
        .badge-group { display: flex; gap: 6px; align-items: center; }
        .key-timer { 
            font-size: 11px; font-weight: 500; 
            color: var(--accent); background: rgba(99, 102, 241, 0.1); 
            padding: 4px 10px; border-radius: 8px;
        }
        /* เพิ่มสไตล์ตัวบอกสถานะล็อก HWID */
        .hwid-status { font-size: 10px; color: var(--text-dim); }

        /* ปรับ grid actions เพื่อรองรับปุ่ม Reset */
        .actions { display: grid; grid-template-columns: 45px 1fr 1fr 38px 38px; gap: 6px; }
        
        .input-qty {
            margin: 0 !important; height: 38px !important; padding: 0 !important;
            text-align: center; border-radius: 10px !important; background: rgba(255,255,255,0.05);
            font-size: 13px; font-weight: 500;
        }
        .btn-sm { padding: 0; border-radius: 10px; font-size: 12px; background: rgba(255, 255, 255, 0.05); color: #fff; border: 1px solid var(--border); height: 38px; font-weight: 500; display: flex; align-items: center; justify-content: center; }
        .btn-del { color: var(--danger); border-color: rgba(239, 68, 68, 0.2); }
        .btn-reset { color: var(--success); border-color: rgba(16, 185, 129, 0.2); font-size: 16px; }

        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #fff; color: #000; padding: 10px 20px; border-radius: 50px;
            font-size: 12px; font-weight: 600; display: none; z-index: 1000;
        }
    </style>
</head>
<body>

<div id="toast">Saved Successfully</div>

<div class="container">
    <div id="login-screen" class="card">
        <h2>JOOD Admin Access</h2>
        <span class="label">Access Password</span>
        <input type="password" id="adminPass" placeholder="••••">
        <button class="btn-primary" onclick="checkLogin()">Authenticate</button>
    </div>

    <div id="dashboard" style="display:none;">
        <div class="card">
            <h2>Key Management</h2>
            <span class="label">Default Duration</span>
            <div class="custom-select">
                <div class="select-selected" id="selected-val" onclick="toggleDropdown()">1 Day Access</div>
                <div class="select-items" id="dropdown-items">
                    <div onclick="setDuration(1, '1 Day Access')">1 Day Access</div>
                    <div onclick="setDuration(7, '7 Days Access')">7 Days Access</div>
                    <div onclick="setDuration(30, '30 Days Access')">30 Days Access</div>
                </div>
            </div>
            <button class="btn-primary" onclick="generateAndSave()">Generate New Key</button>
        </div>
        <div id="list-container"></div>
    </div>
</div>

<script>
    const DB_URL = "https://jood-af2d8-default-rtdb.asia-southeast1.firebasedatabase.app/keys";
    const DB_SECRET = "JXRzMTiI2hQo9rps823i8guY5y14fxWPUeFDO5oU";
    const ADMIN_PASS = "1122"; 

    let currentDuration = 1;
    let allKeys = {};

    function toggleDropdown() { document.getElementById("dropdown-items").classList.toggle("select-show"); }
    function setDuration(val, text) {
        currentDuration = val;
        document.getElementById("selected-val").innerText = text;
        document.getElementById("dropdown-items").classList.remove("select-show");
    }

    window.onclick = function(event) {
        if (!event.target.matches('.select-selected')) {
            const dropdown = document.getElementById("dropdown-items");
            if(dropdown) dropdown.classList.remove("select-show");
        }
    }

    function checkLogin() {
        if (document.getElementById('adminPass').value === ADMIN_PASS) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            startDataSync();
        } else { alert("Incorrect Password"); }
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }

    function getCountdown(expiry) {
        const diff = expiry - Math.floor(Date.now() / 1000);
        if (diff <= 0) return "EXPIRED";
        const d = Math.floor(diff / 86400), h = Math.floor((diff % 86400) / 3600), m = Math.floor((diff % 3600) / 60), s = diff % 60;
        return (d > 0 ? d + "d " : "") + `${h}h ${m}m ${s}s`;
    }

    async function fetchKeys() {
        try {
            const res = await fetch(`${DB_URL}.json?auth=${DB_SECRET}`);
            allKeys = await res.json() || {};
            renderList();
        } catch (e) {}
    }

    function renderList() {
        const container = document.getElementById('list-container');
        container.innerHTML = "";
        Object.keys(allKeys).reverse().forEach(id => {
            const item = allKeys[id];
            const hasHWID = item.hwid && item.hwid !== "";
            const div = document.createElement('div');
            div.className = 'key-item';
            div.innerHTML = `
                <div class="key-info">
                    <div>
                        <span class="key-id">${id}</span>
                        <div class="hwid-status">${hasHWID ? '🔒 Locked' : '🔓 Available'}</div>
                    </div>
                    <span class="key-timer" id="timer-${id}">${getCountdown(item.expiry)}</span>
                </div>
                <div class="actions">
                    <input type="number" class="input-qty" id="val-${id}" value="1">
                    <button class="btn-sm" onclick="updateTime('${id}', ${item.expiry}, 'add')">+ D</button>
                    <button class="btn-sm" onclick="updateTime('${id}', ${item.expiry}, 'sub')">- D</button>
                    <button class="btn-sm btn-reset" title="Reset HWID" onclick="resetHWID('${id}')">↺</button>
                    <button class="btn-sm btn-del" title="Delete Key" onclick="deleteKey('${id}')">✕</button>
                </div>`;
            container.appendChild(div);
        });
    }

    setInterval(() => {
        for (let id in allKeys) {
            const el = document.getElementById(`timer-${id}`);
            if (el) {
                const timeStr = getCountdown(allKeys[id].expiry);
                el.innerText = timeStr;
                if (timeStr === "EXPIRED") fetchKeys();
            }
        }
    }, 1000);

    async function generateAndSave() {
        const key = 'JOOD-' + Math.random().toString(36).substring(2, 7).toUpperCase();
        const expiry = Math.floor(Date.now() / 1000) + (currentDuration * 86400);
        await fetch(`${DB_URL}/${key}.json?auth=${DB_SECRET}`, { 
            method: 'PUT', 
            body: JSON.stringify({ expiry: expiry, hwid: "" }) 
        });
        showToast("Key Generated"); fetchKeys();
    }

    async function updateTime(key, currentExpiry, mode) {
        const days = parseInt(document.getElementById(`val-${key}`).value) || 0;
        const newExpiry = mode === 'add' ? currentExpiry + (days * 86400) : currentExpiry - (days * 86400);
        await fetch(`${DB_URL}/${key}/expiry.json?auth=${DB_SECRET}`, { method: 'PUT', body: JSON.stringify(newExpiry) });
        showToast("Time Updated"); fetchKeys();
    }

    async function resetHWID(key) {
        if (!confirm("ต้องการรีเซ็ต HWID สำหรับ " + key + " ใช่หรือไม่?")) return;
        await fetch(`${DB_URL}/${key}/hwid.json?auth=${DB_SECRET}`, { 
            method: 'PUT', 
            body: JSON.stringify("") 
        });
        showToast("HWID Reset Success"); fetchKeys();
    }

    async function deleteKey(key) {
        if (!confirm("Delete " + key + "?")) return;
        await fetch(`${DB_URL}/${key}.json?auth=${DB_SECRET}`, { method: 'DELETE' });
        showToast("Deleted"); fetchKeys();
    }

    function startDataSync() { fetchKeys(); setInterval(fetchKeys, 20000); }
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Jood Script Key Generator</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: #2a2a2a; padding: 20px; border-radius: 10px; width: 350px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        select, button, input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { background: #4CAF50; color: white; cursor: pointer; font-weight: bold; }
        #result { background: #111; padding: 10px; word-break: break-all; color: #00ff00; font-family: monospace; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Generate Key</h2>
        <label>เลือกอายุการใช้งาน:</label>
        <select id="duration">
            <option value="1">1 วัน</option>
            <option value="7">7 วัน</option>
            <option value="30">30 วัน</option>
        </select>
        <button onclick="generateKey()">สร้าง Key ใหม่</button>
        <div id="result">Key จะปรากฏที่นี่...</div>
    </div>

    <script>
        // ฟังก์ชันสร้าง Key แบบสุ่ม
        function makeid(length) {
            let result = 'JOOD-';
            const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            for (let i = 0; i < length; i++) {
                result += characters.charAt(Math.floor(Math.random() * characters.length));
                if (i === 3) result += '-';
            }
            return result;
        }

        function generateKey() {
            const days = document.getElementById('duration').value;
            const newKey = makeid(8);
            
            // คำนวณเวลาหมดอายุ (ปัจจุบัน + วินาทีตามจำนวนวัน)
            const expiryTimestamp = Math.floor(Date.now() / 1000) + (days * 24 * 60 * 60);

            const data = {
                [newKey]: {
                    expiry: expiryTimestamp,
                    duration: days + " Days"
                }
            };

            // แสดงผล (ในใช้งานจริงต้องใช้ Fetch API ส่งค่าไป Firebase)
            document.getElementById('result').innerText = `Key: ${newKey}\nExpires: ${new Date(expiryTimestamp * 1000).toLocaleString()}`;
            
            console.log("ส่งข้อมูลนี้ไปที่ Database:", data);
            alert("Copy Key นี้ไปใส่ใน Database ของคุณได้เลย!");
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOOD | One-Click Key Generator</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #3b82f6; --accent: #10b981; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 2.5rem; border-radius: 1.5rem; width: 100%; max-width: 400px; border: 1px solid #334155; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center; }
        h2 { color: var(--primary); margin-bottom: 1.5rem; font-size: 1.8rem; }
        select { width: 100%; padding: 12px; border-radius: 8px; background: #0f172a; color: white; border: 1px solid #334155; margin-bottom: 1.5rem; font-size: 1rem; cursor: pointer; outline: none; }
        .btn-main { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--primary); color: white; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }
        .btn-main:hover { background: #2563eb; transform: translateY(-2px); }
        .btn-main:disabled { background: #475569; cursor: not-allowed; transform: none; }
        .result-box { margin-top: 2rem; padding: 15px; background: rgba(16, 185, 129, 0.1); border: 1px dashed var(--accent); border-radius: 10px; display: none; }
        .key-text { font-family: 'Courier New', Courier, monospace; font-size: 1.4rem; color: var(--accent); font-weight: bold; margin: 10px 0; display: block; word-break: break-all; }
        .status { margin-top: 1rem; font-size: 0.85rem; color: #94a3b8; }
        .copy-hint { font-size: 0.75rem; color: #64748b; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>JOOD GENERATOR</h2>
    
    <label style="display:block; margin-bottom: 10px; color: #94a3b8; font-size: 0.9rem;">เลือกอายุการใช้งาน Key</label>
    <select id="duration">
        <option value="7">7 วัน (Weekly)</option>
        <option value="30">30 วัน (Monthly)</option>
    </select>

    <button id="mainBtn" class="btn-main" onclick="autoGenerateAndSync()">สร้าง Key และเปิดใช้งานทันที</button>
    
    <div id="status" class="status">สถานะ: พร้อมสร้าง Key</div>

    <div id="resultArea" class="result-box">
        <span style="color: #f8fafc; font-size: 0.9rem;">สร้างและบันทึกสำเร็จ!</span>
        <span id="keyOutput" class="key-text"></span>
        <div class="copy-hint">ก๊อปปี้ Key นี้ไปใช้ในสคริปต์ได้เลย</div>
    </div>
</div>

<script>
    // ข้อมูลเชื่อมต่อ GitHub (ตั้งค่าไว้ให้พร้อมใช้งาน)
    const GITHUB_TOKEN = "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";
    const REPO_OWNER = "Nattawatwww";
    const REPO_NAME = "inventory";
    const FILE_PATH = "keys.json";

    async function autoGenerateAndSync() {
        const btn = document.getElementById('mainBtn');
        const status = document.getElementById('status');
        const resultArea = document.getElementById('resultArea');
        const keyOutput = document.getElementById('keyOutput');
        
        // 1. เตรียมข้อมูล Key ใหม่
        const days = parseInt(document.getElementById('duration').value);
        const newKey = "JOOD-" + Math.random().toString(36).substring(2, 10).toUpperCase();
        const expiryTime = Math.floor(Date.now() / 1000) + (days * 24 * 60 * 60);
        const newKeyData = { [newKey]: { expiry: expiryTime } };

        // เริ่มขั้นตอนการทำงาน
        btn.disabled = true;
        resultArea.style.display = 'none';
        status.innerText = "กำลังเชื่อมต่อ GitHub...";
        
        try {
            // 2. ดึงข้อมูลเดิมจาก GitHub
            const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
                headers: { "Authorization": `token ${GITHUB_TOKEN}` }
            });
            
            if (!res.ok) throw new Error("ไม่สามารถดึงข้อมูลจาก GitHub ได้");
            
            const fileData = await res.json();
            const sha = fileData.sha;
            const oldContent = JSON.parse(atob(fileData.content));

            // 3. รวมข้อมูลใหม่เข้าไป
            const finalData = { ...oldContent, ...newKeyData };

            status.innerText = "กำลังบันทึก Key ลงในระบบ...";

            // 4. บันทึกข้อมูลกลับไปที่ GitHub
            const putRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
                method: "PUT",
                headers: {
                    "Authorization": `token ${GITHUB_TOKEN}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: `Auto-create key: ${newKey}`,
                    content: btoa(JSON.stringify(finalData, null, 2)),
                    sha: sha
                })
            });

            if (putRes.ok) {
                status.innerText = "✅ เสร็จสมบูรณ์!";
                keyOutput.innerText = newKey;
                resultArea.style.display = 'block';
            } else {
                status.innerText = "❌ เกิดข้อผิดพลาดในการบันทึก";
            }
        } catch (e) {
            status.innerText = "❌ ล้มเหลว: " + e.message;
            console.error(e);
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>

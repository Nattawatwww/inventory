<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jood Admin</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        
        :root {
            --bg: #f5f5f7;
            --card: #ffffff;
            --primary: #000000;
            --accent: #0071e3;
            --danger: #ff3b30;
            --text-main: #1d1d1f;
            --text-dim: #86868b;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container { width: 100%; max-width: 450px; }
        
        /* White Minimal Card */
        .card { 
            background: var(--card); 
            padding: 24px; 
            border-radius: 20px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        h2 { font-weight: 600; letter-spacing: -0.5px; margin-bottom: 20px; text-align: center; font-size: 20px; }

        input, select { 
            width: 100%; 
            background: #fbfbfd; 
            border: 1px solid #d2d2d7;
            padding: 12px; 
            border-radius: 10px; 
            color: var(--text-main); 
            margin-bottom: 10px;
            font-size: 16px; /* ป้องกัน iOS ซูมเข้าตอนพิมพ์ */
            box-sizing: border-box;
            outline: none;
            transition: border 0.2s;
        }
        input:focus { border-color: var(--accent); }

        button { 
            width: 100%; 
            padding: 12px; 
            border-radius: 10px; 
            border: none; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.2s;
            font-size: 14px;
        }

        .btn-main { background: var(--primary); color: white; }
        .btn-main:active { transform: scale(0.98); }

        /* Key List Styling */
        .key-item { 
            background: var(--card);
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .key-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .key-name { font-weight: 600; font-size: 15px; color: var(--primary); }
        .countdown { font-size: 12px; color: var(--accent); font-weight: 600; font-family: monospace; }

        /* Mobile Friendly Controls */
        .control-group { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .input-mini { width: 50px !important; margin: 0 !important; padding: 6px !important; text-align: center; font-size: 14px !important; }
        
        .btn-tool { width: auto; flex: 1; padding: 8px; background: #f5f5f7; color: var(--text-main); border: 1px solid #d2d2d7; }
        .btn-del { color: var(--danger); border-color: #ffdada; background: #fff5f5; }

        #toast { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 10px 20px; border-radius: 30px; font-size: 13px; z-index: 1000; }
    </style>
</head>
<body>

<div id="toast">บันทึกเรียบร้อย</div>

<div class="container">
    <div id="login-screen" class="card">
        <h2>Admin Panel</h2>
        <input type="password" id="adminPass" placeholder="Password">
        <button class="btn-main" onclick="checkLogin()">Login</button>
    </div>

    <div id="dashboard" style="display:none;">
        <div class="card">
            <h2>New Key</h2>
            <select id="duration">
                <option value="1">1 วัน</option>
                <option value="7">7 วัน</option>
                <option value="30">30 วัน</option>
            </select>
            <button class="btn-main" onclick="generateAndSave()">สร้าง Key</button>
        </div>

        <div id="list-container"></div>
    </div>
</div>

<script>
    const DB_URL = "https://jood-af2d8-default-rtdb.asia-southeast1.firebasedatabase.app/keys";
    const DB_SECRET = "JXRzMTiI2hQo9rps823i8guY5y14fxWPUeFDO5oU";
    const ADMIN_PASS = "1122"; 

    let allKeys = {};

    function checkLogin() {
        if (document.getElementById('adminPass').value === ADMIN_PASS) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            startDataSync();
        } else { alert("รหัสผ่านไม่ถูกต้อง"); }
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }

    // ฟังก์ชันนับถอยหลัง
    function getCountdown(expiry) {
        const now = Math.floor(Date.now() / 1000);
        const diff = expiry - now;
        if (diff <= 0) return "EXPIRED";
        const d = Math.floor(diff / 86400);
        const h = Math.floor((diff % 86400) / 3600);
        const m = Math.floor((diff % 3600) / 60);
        const s = diff % 60;
        return `${d}d ${h}h ${m}m ${s}s`;
    }

    async function fetchKeys() {
        try {
            const res = await fetch(`${DB_URL}.json?auth=${DB_SECRET}`);
            allKeys = await res.json() || {};
            renderList();
        } catch (e) { console.error("Fetch Error"); }
    }

    function renderList() {
        const container = document.getElementById('list-container');
        container.innerHTML = "";
        const now = Math.floor(Date.now() / 1000);

        for (let id in allKeys) {
            const item = allKeys[id];
            
            // เงื่อนไข: ถ้าหมดอายุ (ต่ำกว่าเวลาปัจจุบัน) ให้ลบออกจาก Firebase ทันที
            if (item.expiry <= now) {
                deleteKey(id, true); // ลบแบบเงียบๆ
                continue;
            }

            const div = document.createElement('div');
            div.className = 'key-item';
            div.innerHTML = `
                <div class="key-header">
                    <span class="key-name">${id}</span>
                    <span class="countdown" id="timer-${id}">${getCountdown(item.expiry)}</span>
                </div>
                <div class="control-group">
                    <input type="number" class="input-mini" id="val-${id}" value="1">
                    <button class="btn-tool" onclick="updateTime('${id}', ${item.expiry}, 'add')">+ วัน</button>
                    <button class="btn-tool" onclick="updateTime('${id}', ${item.expiry}, 'sub')">- วัน</button>
                    <button class="btn-tool btn-del" onclick="deleteKey('${id}')">ลบถาวร</button>
                </div>
            `;
            container.appendChild(div);
        }
    }

    // อัปเดตตัวเลขถอยหลังทุกวินาที
    setInterval(() => {
        for (let id in allKeys) {
            const el = document.getElementById(`timer-${id}`);
            if (el) {
                const timeStr = getCountdown(allKeys[id].expiry);
                el.innerText = timeStr;
                if (timeStr === "EXPIRED") fetchKeys(); // รีเฟรชเพื่อลบ Key ออก
            }
        }
    }, 1000);

    async function startDataSync() {
        await fetchKeys();
        setInterval(fetchKeys, 10000); // ดึงข้อมูลใหม่ทุก 10 วินาที
    }

    async function generateAndSave() {
        const days = parseInt(document.getElementById('duration').value);
        const key = 'JOOD-' + Math.random().toString(36).substring(2, 8).toUpperCase();
        const expiry = Math.floor(Date.now() / 1000) + (days * 86400);

        await fetch(`${DB_URL}/${key}.json?auth=${DB_SECRET}`, {
            method: 'PUT',
            body: JSON.stringify({ expiry: expiry })
        });
        showToast("สร้าง Key สำเร็จ");
        fetchKeys();
    }

    async function updateTime(key, currentExpiry, mode) {
        const days = parseInt(document.getElementById(`val-${key}`).value) || 0;
        const newExpiry = mode === 'add' ? currentExpiry + (days * 86400) : currentExpiry - (days * 86400);

        await fetch(`${DB_URL}/${key}/expiry.json?auth=${DB_SECRET}`, {
            method: 'PUT',
            body: JSON.stringify(newExpiry)
        });
        showToast("อัปเดตเวลาสำเร็จ");
        fetchKeys();
    }

    async function deleteKey(key, silent = false) {
        if (!silent && !confirm("ยืนยันการลบ " + key)) return;
        await fetch(`${DB_URL}/${key}.json?auth=${DB_SECRET}`, { method: 'DELETE' });
        if (!silent) showToast("ลบ Key แล้ว");
        fetchKeys();
    }
</script>

</body>
</html>

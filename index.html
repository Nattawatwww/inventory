<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        :root {
            --bg: #0b0f1a;
            --card-bg: rgba(23, 28, 41, 0.9);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #6366f1;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --success: #10b981;
            --input-bg: rgba(255, 255, 255, 0.03);
            --admin-gold: #fbbf24;
        }

        * { 
            box-sizing: border-box; 
            transition: all 0.2s ease; 
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1e1b4b, var(--bg));
            color: var(--text-main);
            margin: 0;
            display: flex; justify-content: center;
            min-height: 100vh; padding: 40px 20px;
        }

        .container { width: 100%; max-width: 480px; }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
            position: relative;
        }

        h2 { margin: 0 0 24px 0; font-weight: 600; font-size: 18px; text-align: center; }

        .label { 
            font-size: 10px; font-weight: 600; color: var(--text-dim); 
            text-transform: uppercase; margin-bottom: 8px; display: block; 
        }

        .custom-select { position: relative; width: 100%; margin-bottom: 20px; z-index: 100; }
        .select-selected {
            background: var(--input-bg);
            border: 1px solid var(--border);
            padding: 14px 18px;
            border-radius: 16px;
            cursor: pointer;
            display: flex; justify-content: space-between; align-items: center; 
            font-size: 14px;
        }
        .select-selected:after {
            content: ""; width: 6px; height: 6px;
            border-right: 1.5px solid var(--text-dim); border-bottom: 1.5px solid var(--text-dim);
            transform: rotate(45deg); margin-bottom: 3px;
        }
        .select-items {
            position: absolute; 
            background: #1a1f2e; 
            border: 1px solid var(--border);
            border-radius: 16px; 
            top: calc(100% + 5px); left: 0; right: 0;
            z-index: 999;
            overflow: hidden; 
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        .select-items div { padding: 14px 18px; cursor: pointer; font-size: 14px; color: var(--text-dim); }
        .select-items div:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }
        .select-show { display: block !important; }

        .search-container { margin-bottom: 16px; position: relative; z-index: 1; }
        .search-input {
            width: 100%; background: var(--input-bg); border: 1px solid var(--border);
            padding: 12px 18px 12px 40px; border-radius: 16px; color: #fff; outline: none;
        }

        input[type="password"] {
            width: 100%; background: var(--input-bg); border: 1px solid var(--border);
            padding: 14px 18px; border-radius: 16px; color: #fff; margin-bottom: 20px; outline: none;
        }

        button {
            width: 100%; padding: 14px; border-radius: 16px; border: none;
            font-weight: 500; cursor: pointer; font-size: 14px;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { transform: translateY(-1px); filter: brightness(1.1); }

        .key-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 20px; padding: 18px; margin-bottom: 12px;
        }
        .key-info { display: flex; justify-content: space-between; align-items: start; margin-bottom: 14px; }
        .key-id { font-weight: 600; color: #fff; display: block; margin-bottom: 4px; }
        .status-unlimited { color: var(--admin-gold); font-weight: bold; }
        .key-timer { font-size: 11px; color: var(--accent); background: rgba(99, 102, 241, 0.1); padding: 4px 10px; border-radius: 8px; }

        .actions { display: grid; grid-template-columns: 45px 1fr 1fr 38px 38px; gap: 6px; }
        .input-qty {
            text-align: center; border-radius: 10px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--border); color: #fff; height: 38px;
        }
        .btn-sm { border-radius: 10px; font-size: 12px; background: rgba(255, 255, 255, 0.05); color: #fff; border: 1px solid var(--border); height: 38px; }
        .btn-del { color: var(--danger); }
        .btn-reset { color: var(--success); }

        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #fff; color: #000; padding: 10px 20px; border-radius: 50px;
            font-size: 12px; font-weight: 600; display: none; z-index: 2000;
        }
    </style>
</head>
<body>

<div id="toast">Saved Successfully</div>

<div class="container">
    <div id="login-screen" class="card">
        <h2>Admin Access</h2>
        <span class="label">Access Password</span>
        <input type="password" id="adminPass" placeholder="••••">
        <button class="btn-primary" onclick="checkLogin()">Authenticate</button>
    </div>

    <div id="dashboard" style="display:none;">
        <div class="card">
            <h2>Key Management</h2>
            <span class="label">Default Duration</span>
            <div class="custom-select">
                <div class="select-selected" id="selected-val" onclick="toggleDropdown()">1 Day Access</div>
                <div class="select-items" id="dropdown-items">
                    <div onclick="setDuration(1, '1 Day Access')">1 Day Access</div>
                    <div onclick="setDuration(7, '7 Days Access')">7 Days Access</div>
                    <div onclick="setDuration(30, '30 Days Access')">30 Days Access</div>
                    <div onclick="setDuration(99999, 'Lifetime Access (INF)')">Lifetime Access (INF)</div>
                    <div onclick="setDuration('ADMIN', 'Admin Key')" style="color: #fbbf24; border-top: 1px solid rgba(255,255,255,0.1)">Admin Key</div>
                </div>
            </div>
            <button class="btn-primary" onclick="generateAndSave()">Generate New Key</button>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search Key or Username..." onkeyup="renderList()">
        </div>
        
        <div id="list-container"></div>
    </div>
</div>

<script>
    const BASE_URL = "https://jood-af2d8-default-rtdb.asia-southeast1.firebasedatabase.app";
    const DB_SECRET = "JXRzMTiI2hQo9rps823i8guY5y14fxWPUeFDO5oU";
    const ADMIN_PASS = "1122"; 

    let currentDuration = 1;
    let allKeys = {};
    let userLinks = {};

    function toggleDropdown() { 
        document.getElementById("dropdown-items").classList.toggle("select-show"); 
    }
    
    function setDuration(val, text) {
        currentDuration = val;
        document.getElementById("selected-val").innerText = text;
        document.getElementById("dropdown-items").classList.remove("select-show");
    }

    window.onclick = function(event) {
        if (!event.target.matches('.select-selected')) {
            document.getElementById("dropdown-items").classList.remove("select-show");
        }
    }

    function checkLogin() {
        if (document.getElementById('adminPass').value === ADMIN_PASS) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            startDataSync();
        } else { alert("Incorrect Password"); }
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }

    function getCountdown(expiry) {
        if (expiry > 2500000000) return "∞ INFINITE";
        const diff = expiry - Math.floor(Date.now() / 1000);
        if (diff <= 0) return "EXPIRED";
        const d = Math.floor(diff / 86400), h = Math.floor((diff % 86400) / 3600), m = Math.floor((diff % 3600) / 60), s = diff % 60;
        return (d > 0 ? d + "d " : "") + `${h}h ${m}m ${s}s`;
    }

    async function fetchKeys() {
        try {
            const [resKeys, resLinks] = await Promise.all([
                fetch(`${BASE_URL}/keys.json?auth=${DB_SECRET}`),
                fetch(`${BASE_URL}/user_links.json?auth=${DB_SECRET}`)
            ]);
            allKeys = await resKeys.json() || {};
            userLinks = await resLinks.json() || {};
            renderList();
        } catch (e) { console.error(e); }
    }

    function renderList() {
        const container = document.getElementById('list-container');
        const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || "";
        container.innerHTML = "";
        
        const keyToUserInfo = {};
        Object.entries(userLinks).forEach(([uid, data]) => {
            keyToUserInfo[typeof data === 'object' ? data.key : data] = { name: data.name || uid };
        });

        const filteredKeys = Object.keys(allKeys).reverse().filter(id => {
            const user = keyToUserInfo[id];
            return id.toLowerCase().includes(searchTerm) || (user && user.name.toLowerCase().includes(searchTerm));
        });

        filteredKeys.forEach(id => {
            const item = allKeys[id];
            const isUnlimited = item.hwid === "NONE";
            const hasHWID = item.hwid && item.hwid !== "" && item.hwid !== "NONE";
            const user = keyToUserInfo[id];
            
            const div = document.createElement('div');
            div.className = 'key-item';
            div.innerHTML = `
                <div class="key-info">
                    <div>
                        <span class="key-id">${id}</span>
                        <div style="font-size:11px; color:var(--text-dim)">
                            <span class="${isUnlimited ? 'status-unlimited' : ''}">
                                ${isUnlimited ? '🔓 UNLIMITED' : (hasHWID ? '🔒 Locked' : '🔓 Available')}
                            </span>
                            ${user ? ` | 👤 ${user.name}` : ''}
                        </div>
                    </div>
                    <span class="key-timer" id="timer-${id}">${getCountdown(item.expiry)}</span>
                </div>
                <div class="actions">
                    <input type="number" class="input-qty" id="val-${id}" value="1">
                    <button class="btn-sm" onclick="updateTime('${id}', ${item.expiry}, 'add')">+ D</button>
                    <button class="btn-sm" onclick="updateTime('${id}', ${item.expiry}, 'sub')">- D</button>
                    <button class="btn-sm btn-reset" onclick="resetHWID('${id}')" ${isUnlimited ? 'disabled style="opacity:0.2"' : ''}>↺</button>
                    <button class="btn-sm btn-del" onclick="deleteKey('${id}')">✕</button>
                </div>`;
            container.appendChild(div);
        });
    }

    async function generateAndSave() {
        const prefix = currentDuration === 'ADMIN' ? 'OW-' : 'QA-';
        const key = prefix + Math.random().toString(36).substring(2, 7).toUpperCase();
        
        let expiry = (currentDuration === 'ADMIN' || currentDuration === 99999) ? 3000000000 : Math.floor(Date.now() / 1000) + (currentDuration * 86400);
        let hwid = currentDuration === 'ADMIN' ? "NONE" : "";

        await fetch(`${BASE_URL}/keys/${key}.json?auth=${DB_SECRET}`, { 
            method: 'PUT', body: JSON.stringify({ expiry, hwid }) 
        });
        showToast("Key Generated: " + key);
        fetchKeys();
    }

    async function updateTime(key, cur, mode) {
        const days = parseInt(document.getElementById(`val-${key}`).value) || 0;
        let expiry = mode === 'add' ? cur + (days * 86400) : cur - (days * 86400);
        await fetch(`${BASE_URL}/keys/${key}/expiry.json?auth=${DB_SECRET}`, { method: 'PUT', body: JSON.stringify(expiry) });
        showToast("Updated"); fetchKeys();
    }

    async function resetHWID(key) {
        if (!confirm("Reset HWID?")) return;
        await fetch(`${BASE_URL}/keys/${key}/hwid.json?auth=${DB_SECRET}`, { method: 'PUT', body: JSON.stringify("") });
        showToast("Reset Done"); fetchKeys();
    }

    async function deleteKey(key) {
        if (!confirm("Delete " + key + "?")) return;
        await fetch(`${BASE_URL}/keys/${key}.json?auth=${DB_SECRET}`, { method: 'DELETE' });
        showToast("Deleted"); fetchKeys();
    }

    function startDataSync() { fetchKeys(); setInterval(fetchKeys, 15000); }
    
    // อัปเดต Timer ทุกวินาที
    setInterval(() => {
        for (let id in allKeys) {
            const el = document.getElementById(`timer-${id}`);
            if (el) el.innerText = getCountdown(allKeys[id].expiry);
        }
    }, 1000);
</script>
</body>
</html>

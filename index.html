<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>JOOD | Admin Panel (Auto-Sync)</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #3b82f6; --accent: #10b981; --danger: #ef4444; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 40px 20px; margin: 0; }
        .card { background: var(--card); padding: 2rem; border-radius: 1rem; width: 100%; max-width: 500px; border: 1px solid #334155; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 1.5rem; }
        .group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.85rem; color: #94a3b8; }
        select, button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-size: 1rem; cursor: pointer; transition: 0.2s; }
        select { background: #0f172a; color: white; border: 1px solid #334155; margin-bottom: 1rem; }
        .btn-gen { background: var(--primary); color: white; font-weight: bold; }
        .btn-gen:hover { background: #2563eb; }
        .btn-save { background: var(--accent); color: white; font-weight: bold; margin-top: 10px; display: none; }
        .status { text-align: center; margin-top: 15px; font-size: 0.85rem; padding: 10px; border-radius: 5px; }
        .key-display { background: #000; padding: 15px; border-radius: 8px; color: var(--accent); font-family: monospace; text-align: center; margin: 10px 0; border: 1px dashed var(--accent); display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>JOOD Key Admin</h2>
    
    <div class="group">
        <label>เลือกระยะเวลา Key</label>
        <select id="duration">
            <option value="7">7 วัน (Weekly)</option>
            <option value="30">30 วัน (Monthly)</option>
        </select>
        <button class="btn-gen" onclick="generateKey()">+ สร้าง Key ใหม่</button>
    </div>

    <div id="keyShow" class="key-display"></div>

    <button id="saveBtn" class="btn-save" onclick="syncToGitHub()">บันทึกข้อมูลเข้า GitHub</button>
    
    <div id="status" class="status">สถานะ: พร้อมใช้งาน</div>
</div>

<script>
    // ข้อมูลระบบ (ฝังไว้ให้แล้ว)
    const GITHUB_TOKEN = "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";
    const REPO_OWNER = "Nattawatwww";
    const REPO_NAME = "inventory";
    const FILE_PATH = "keys.json";

    let pendingData = null;

    function generateKey() {
        const days = parseInt(document.getElementById('duration').value);
        const key = "JOOD-" + Math.random().toString(36).substring(2, 10).toUpperCase();
        const expiry = Math.floor(Date.now() / 1000) + (days * 24 * 60 * 60);
        
        pendingData = { [key]: { expiry: expiry } };
        
        const display = document.getElementById('keyShow');
        display.innerText = "Key ใหม่: " + key;
        display.style.display = 'block';
        document.getElementById('saveBtn').style.display = 'block';
        document.getElementById('status').innerText = "สถานะ: รอการบันทึก...";
    }

    async function syncToGitHub() {
        const status = document.getElementById('status');
        status.innerText = "🔄 กำลังเชื่อมต่อ GitHub...";
        
        try {
            // 1. ดึงข้อมูลเดิม
            const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
                headers: { "Authorization": `token ${GITHUB_TOKEN}` }
            });
            
            const fileData = await res.json();
            const sha = fileData.sha;
            const oldContent = JSON.parse(atob(fileData.content));

            // 2. รวมข้อมูล
            const finalData = { ...oldContent, ...pendingData };

            // 3. บันทึกกลับ
            const putRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
                method: "PUT",
                headers: {
                    "Authorization": `token ${GITHUB_TOKEN}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: "Update key via Admin Panel",
                    content: btoa(JSON.stringify(finalData, null, 2)),
                    sha: sha
                })
            });

            if (putRes.ok) {
                status.style.color = "#10b981";
                status.innerText = "✅ บันทึกสำเร็จ! Key ใช้งานได้ทันที";
                document.getElementById('saveBtn').style.display = 'none';
            } else {
                status.innerText = "❌ เกิดข้อผิดพลาดในการบันทึก";
            }
        } catch (e) {
            status.innerText = "❌ เชื่อมต่อล้มเหลว: " + e.message;
        }
    }
</script>

</body>
</html>
